env: "prod"

swagger:
  enabled: true

tokens:
  access_token_ttl: 1h
  refresh_token_ttl: 168h
  verification_token_ttl: 15m
  reset_token_ttl: 15m

two_factor_auth:
  token_ttl: 10m
  redirect_url: "http://localhost:8082"
  pending_session_ttl: 10m

oauth:
  state_ttl: 5m
  handlers_timeout: 10s
  allowed_redirect_hosts:
    - localhost

http_server:
  address: ":8082"
  timeout: 4s
  idle_timeout: 30s
  handlers_timeout: 5s

postgres:
  host: "postgres"
  port: 5432
  sslmode: "disable"

redis:
  addr: "redis:6379"
  db: 1

rabbitmq:
  queue_name: "notificationsQueue"
