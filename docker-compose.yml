services:
  postgres:
    build:
      context: ./docker/postgres
    container_name: auth_pg
    env_file: .env
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
    command: >
      postgres
      -c shared_preload_libraries=pg_cron
      -c cron.database_name=auth_service
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks: [backend]
  redis:
    image: redis:8
    container_name: auth_service_cache
    restart: unless-stopped
    env_file: .env
    expose:
      - "6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256m
    networks: [backend]
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: unless-stopped
    env_file: .env
    expose:
      - "5672"
      - "15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m
    networks: [backend]
  auth_service:
    build:
      context: ./auth_service/docker
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    container_name: auth_service
    restart: unless-stopped
    stop_grace_period: 15s
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      redis: { condition: service_healthy }
    env_file: ./auth_service/.env
    volumes:
      - ./auth_service/config:/app/config
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8082/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256m
    networks: [backend, frontend]
  mail_sender:
    build:
      context: ./email_sender/docker
      dockerfile: Dockerfile
    container_name: email_sender
    restart: unless-stopped
    stop_grace_period: 15s
    depends_on:
      rabbitmq: { condition: service_healthy }
    env_file: ./email_sender/.env
    volumes:
      - ./email_sender/config:/app/config
    deploy:
      resources:
        limits:
          memory: 128m
    networks: [backend]

networks:
  backend:
  frontend:

volumes:
  postgres_data:
  redis_data:
