services:
  postgres:
    build:
      context: ./docker/postgres
    container_name: auth_pg
    env_file: .env
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
    command: >
      postgres
      -c shared_preload_libraries=pg_cron
      -c cron.database_name=auth_service
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks: [backend]
  redis:
    image: redis:8
    container_name: auth_service_cache
    restart: unless-stopped
    env_file: .env
    expose:
      - "6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --save 300 100
      --save 60 10000
      --appendonly no
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256m
    networks: [backend]
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: unless-stopped
    env_file: .env
    command: >
      sh -c "rabbitmq-plugins enable --offline rabbitmq_prometheus &&
      rabbitmq-server"
    volumes:
      - ./monitoring/rabbitmq/rabbitmq.conf:/etc/rabbitmq/conf.d/99-prometheus.conf:ro
      - rabbitmq_data:/var/lib/rabbitmq
    expose:
      - "5672"
      - "15672"
      - "15692"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m
    networks: [backend]
  auth_service:
    build:
      context: ./auth_service
      dockerfile: docker/Dockerfile
    ports:
      - "8082:8082"
    container_name: auth_service
    restart: unless-stopped
    stop_grace_period: 15s
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      redis: { condition: service_healthy }
    env_file: ./auth_service/.env
    volumes:
      - ./auth_service/config:/app/config:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8082/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256m
    networks: [backend, frontend]
  mail_sender:
    build:
      context: ./email_sender
      dockerfile: docker/Dockerfile
    container_name: email_sender
    restart: unless-stopped
    stop_grace_period: 15s
    depends_on:
      rabbitmq: { condition: service_healthy }
      auth_service: { condition: service_healthy }
    env_file: ./email_sender/.env
    volumes:
      - ./email_sender/config:/app/config:ro
    expose:
      - "8081"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128m
    networks: [backend]
  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:v0.17.1
    container_name: postgres_exporter
    restart: unless-stopped
    env_file: ./monitoring/.env
    environment:
      PG_EXPORTER_AUTO_DISCOVER_DATABASES: "false"
      PG_EXPORTER_EXCLUDE_DATABASES: "template0,template1,postgres"
    expose:
      - "9187"
    depends_on:
      postgres: { condition: service_healthy }
    deploy:
      resources:
        limits:
          memory: 64m
    networks: [backend]
  redis_exporter:
    image: oliver006/redis_exporter:v1.62.0
    container_name: redis_exporter
    restart: unless-stopped
    env_file: ./monitoring/.env
    expose:
      - "9121"
    depends_on:
      redis: { condition: service_healthy }
    deploy:
      resources:
        limits:
          memory: 64m
    networks: [backend]
  loki:
    image: grafana/loki:3.2.1
    container_name: loki
    restart: unless-stopped
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    expose:
      - "3100"
    deploy:
      resources:
        limits:
          memory: 256m
    networks: [backend]
  promtail:
    image: grafana/promtail:3.2.1
    container_name: promtail
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    deploy:
      resources:
        limits:
          memory: 128m
    networks: [backend]
  grafana:
    image: grafana/grafana:11.3.1
    container_name: grafana
    restart: unless-stopped
    env_file: ./monitoring/.env
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
    deploy:
      resources:
        limits:
          memory: 128m
    networks: [backend]
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
      - "--storage.tsdb.retention.size=2GB"
    expose:
      - "9090"
    depends_on:
      - postgres_exporter
      - redis_exporter
      - rabbitmq
    deploy:
      resources:
        limits:
          memory: 256m
    networks: [backend]

networks:
  backend:
  frontend:

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  loki_data:
  grafana_data:
  rabbitmq_data:
